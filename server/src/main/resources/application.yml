spring:
  application:
    name: strataguard-server
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/strataguard
    username: strataguard
    password: localdev
    driver-class-name: org.postgresql.Driver

firebase:
  project-id: ${FIREBASE_PROJECT_ID:strataguard-app}

aws:
  s3:
    bucket: strataguard-evidence-local
    region: ap-southeast-2
    endpoint: ${AWS_S3_ENDPOINT:}

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

firebase:
  project-id: ${FIREBASE_PROJECT_ID}

aws:
  s3:
    bucket: ${S3_BUCKET}
    region: ap-southeast-2

server:
  port: ${PORT:8080}
